          doc: (docId) => {

              })
            };
          },

            const q = query(collection(firestoreDb, collName), where(field, op, value));

                cb({
                  docs: qs.docs.map(d => ({
                    id: d.id,
                    data: () => d.data()
                  }))
                });
              })
            };
